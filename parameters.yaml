# Rutas
data_dir: "../data/data" # El query selecciona la carpeta de train o test
features_dir: "../data/Features/melspec_311_128"
# features_dir: "../data/Features/melspec_311_128"
model_dir: "./model_output/recon1kl1std" # _ significa . decimal
results_dir: "./results/recon1kl1std"
# Audio
feature:
  n_mels: 128
  n_fft: 1024
  hop_length: 512 # Numero de muestras que se saltan entre frames del espectrograma
  frames: 5 # Numero de frames del espectrograma por vector
  n_hop_frames: 4 # Numero de frames que se saltan entre vectores

# Aleatoriedad
seed: 42

# Modelo
model:
  latent_dim: 8
  hidden_dims: 128

# Entrenamiento
train:
  batch_size: 32
  epochs: 30
  learning_rate: 0.001
  # validation_split: 0.1
  # Pesos de Loss (Requisito clave)
  w_recon: 1.0
  w_kl: 1.0
