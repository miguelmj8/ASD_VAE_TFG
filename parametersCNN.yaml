# Rutas
data_dir: "../data/data" # El query selecciona la carpeta de train o test
features_dir: "../data/Features/melspec_311_128"
# features_dir: "../data/Features/melspec_311_128"
model_dir: "./model_output/CNN/aeimg" # _ significa . decimal
results_dir: "./results/CNN/aeimg"
# Audio
feature:
  n_mels: 128
  n_fft: 1024
  hop_length: 512 # Numero de muestras que se saltan entre frames del espectrograma

# Aleatoriedad
seed: 42

# Modelo
model:
  # latent_dim: 48
  latent_dim: 32

# Entrenamiento
train:
  batch_size: 32
  epochs: 10
  # epochs: 30
  learning_rate: 0.001
  # validation_split: 0.1
  # Pesos de Loss (Requisito clave)
  w_recon: 1.0
  w_kl: 1.0
