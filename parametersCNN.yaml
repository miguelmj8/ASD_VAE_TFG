results_dir: "./results/CNN/_VAE/NoClass/r1kl0_1/OverFitcc1_4f0_1lat48fr16_14all"

# Audio
feature:
  n_mels: 128
  n_fft: 1024
  hop_length: 512 # Numero de muestras que se saltan entre frames del espectrograma
  n_frames: 16 # Potencia de 2 para que cnn no de problemas
  n_hop_frames: 14

# Aleatoriedad
seed: 42

# Modelo
model:
  # latent_dim: 16
  latent_dim: 48

# Entrenamiento
train:
  batch_size: 128
  epochs: 1
  # epochs: 30
  learning_rate: 0.002
  # validation_split: 0.1
  # Pesos de Loss (Requisito clave)
  w_recon: 1.0
  w_kl: 0.1
