  latent_dim: 24

# Entrenamiento
train:
  batch_size: 64
  epochs: 10
  # epochs: 30
  learning_rate: 0.0001
  # validation_split: 0.1
  # Pesos de Loss (Requisito clave)
  w_recon: 1.0
  w_kl: 0.1
  w_class: 1.0
