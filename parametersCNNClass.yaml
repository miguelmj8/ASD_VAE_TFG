# cc5_2f0_25
# Audio
feature:
  n_mels: 128
  n_fft: 1024
  hop_length: 512 # Numero de muestras que se saltan entre frames del espectrograma
  n_frames: 16 # Potencia de 2 para que cnn no de problemas
  n_hop_frames: 14
  # n_frames: 32 # Potencia de 2 para que cnn no de problemas
  # n_hop_frames: 31
# Aleatoriedad
seed: 42

# Modelo
model:
  n_classes: 7
  n_sub: 1
  latent_dim: 48
  # latent_dim: 64

# Entrenamiento
train:
  batch_size: 128
  epochs: 8
  # epochs: 30
  learning_rate: 0.0001
  # validation_split: 0.1
  # Pesos de Loss (Requisito clave)
  w_recon: 1.0
  w_kl: 0.1
  w_class: 1.0
