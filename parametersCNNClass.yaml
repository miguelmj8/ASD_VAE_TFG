# Audio
feature:
  n_mels: 128
  n_fft: 1024
  hop_length: 512 # Numero de muestras que se saltan entre frames del espectrograma
  n_frames: 8 # Potencia de 2 para que cnn no de problemas
  n_hop_frames: 7
